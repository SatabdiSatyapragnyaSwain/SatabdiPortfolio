<div class="main-content">
    <!-- NavBar Starts -->
    <nav class="navbar" [class.scrolled]="isScrolled">
        <img src="../../assets/logo3.png" alt="Logo" class="logo" />
        <ul class="nav-links">
            <li>
                <a href="https://email.com" class="social-icon">
                    <img src="../../assets/SocialMedia/email.png" alt="Email" />
                </a>
            </li>
            <li>
                <a href="https://linkedin.com" class="social-icon">
                    <img src="../../assets/SocialMedia/linkedin.png" alt="LinkedIn" />
                </a>
            </li>
            <li>
                <a href="https://facebook.com" class="social-icon">
                    <img src="../../assets/SocialMedia/facebook.png" alt="Facebook" />
                </a>
            </li>
            <li>
                <a href="https://instagram.com" class="social-icon">
                    <img src="../../assets/SocialMedia/instagram.png" alt="Instagram" />
                </a>
            </li>
            <li>
                <a href="https://whatsapp.com" class="social-icon">
                    <img src="../../assets/SocialMedia/whatsapp.png" alt="WhatsApp" />
                </a>
            </li>
            <li>
                <a href="https://github.com" class="social-icon">
                    <img src="../../assets/SocialMedia/github.png" alt="Github" />
                </a>
            </li>
        </ul>
    </nav>
    <!-- NavBar Ends -->

    <!-- Image-container Starts -->
    <div class="image-container" [class.scrolled]="isScrollToTopVisible">
        <p class="image">
            <img src="../../assets/HyGif.gif" alt="Chat" class="imageImg" />
        </p>
    </div>
    <!-- Image-container Ends -->

    <!-- Water Starts -->
    <div class="scrollToTop" [style.display]="isScrollToTopVisible ? 'block' : 'none'" (click)="scrollToTop()">
        <div class="water" [style.height.%]="scrollPercentage">
            <svg class="wave" viewBox="0 0 560 20">
                <path d="M0,10 C100,0 160,20 260,10 C360,0 420,20 520,10 L520,20 L0,20 Z" fill="#a18c02"></path>
            </svg>
        </div>
        <span><i class="bi bi-chevron-up"></i></span>
    </div>
    <!-- Water Ends -->

    <!-- Main Container Starts -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-6">
                <p class="name">Satabdi Satyapragnya Swain</p>
                <h2 class="description">JUNIOR SOFTWARE DEVELOPER</h2>
                <p class="aboutmyself">Passionate about turning ideas into reliable digital solutions and turning business ideas into powerful solutions with clean and scalable code using Angular, .NET, and SQL Server.</p>
                <button (click)="downloadResume()">Download Resume <i class="bi bi-download"></i></button>
            </div>
            <div class="col-md-6">
                <img src="../../assets/Coder2.png" alt="Coder" class="coderimage" />
                <h2 class="title">DOT NET FULL STACK DEVELOPER</h2>
            </div>
        </div>
    </div>
    <!-- Main Container Starts -->
</div>
